[build]
  base = ""
  command = "npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"
  functions = "backend"

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/models/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200